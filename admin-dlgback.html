<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DLG BET 後台管理</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A84C;
    --gold-dark: #8B6914;
    --black: #060608;
    --black2: #0e0e12;
    --text: #f0e6c8;
    --text-dim: #a08050;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--black);font-family:'Raleway',sans-serif;color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;}
  .container{max-width:500px;width:100%;padding:20px;}
  .card{background:var(--black2);border:1px solid rgba(201,168,76,0.25);border-radius:20px;padding:32px 24px;}
  h2{font-family:'Cinzel',serif;color:var(--gold);text-align:center;letter-spacing:0.1em;margin-bottom:24px;font-size:1.4rem;}
  input,textarea,select{width:100%;padding:12px;background:rgba(255,255,255,0.04);border:1px solid rgba(201,168,76,0.2);border-radius:8px;color:var(--text);font-family:'Raleway',sans-serif;font-size:0.9rem;margin-bottom:15px;outline:none;}
  input:focus,textarea:focus,select:focus{border-color:var(--gold);}
  label{display:block;font-size:0.75rem;color:var(--text-dim);margin-bottom:4px;letter-spacing:0.05em;text-transform:uppercase;}
  .btn{width:100%;padding:14px;border:none;border-radius:10px;font-family:'Cinzel',serif;font-size:0.85rem;font-weight:700;letter-spacing:0.1em;cursor:pointer;color:#0a0a0a;background:linear-gradient(135deg,var(--gold-dark),var(--gold));margin-top:8px;}
  .btn:hover{box-shadow:0 8px 24px rgba(201,168,76,0.35);}
  .btn-outline{background:transparent;border:1px solid var(--gold);color:var(--gold);}
  .btn-outline:hover{background:rgba(201,168,76,0.1);}
  .error{color:#ff6b6b;font-size:0.78rem;text-align:center;display:none;margin-top:10px;}
  .section-title{font-family:'Cinzel',serif;color:var(--gold);font-size:0.9rem;margin:24px 0 12px;border-bottom:1px solid rgba(201,168,76,0.2);padding-bottom:6px;}
  .toggle-wrap{display:flex;align-items:center;gap:10px;margin-bottom:15px;}
  .toggle{position:relative;width:36px;height:20px;}
  .toggle input{display:none;}
  .toggle-track{width:36px;height:20px;border-radius:10px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.1);transition:all 0.3s;position:relative;}
  .toggle input:checked+.toggle-track{background:linear-gradient(90deg,var(--gold-dark),var(--gold));}
  .toggle-track::after{content:'';position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:white;transition:left 0.3s;}
  .toggle input:checked+.toggle-track::after{left:18px;}
  .link-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;background:rgba(255,255,255,0.03);padding:10px;border-radius:8px;border:1px solid rgba(201,168,76,0.1);}
  .link-row .btn-sm{flex:0;width:auto;padding:6px 10px;font-size:0.7rem;margin:0;}
  .btn-sm{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);color:var(--text-dim);border-radius:6px;cursor:pointer;font-family:'Raleway',sans-serif;}
  .btn-sm:hover{background:rgba(201,168,76,0.1);color:var(--gold);}
  .modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:flex;justify-content:center;align-items:center;z-index:1000;}
  .modal-box{background:var(--black2);border:1px solid var(--gold);border-radius:16px;padding:24px;max-width:600px;width:90%;}
  .modal-text{background:#0a0a0a;border:1px solid rgba(201,168,76,0.3);border-radius:8px;padding:12px;color:var(--text);font-family:monospace;font-size:0.75rem;max-height:300px;overflow:auto;white-space:pre-wrap;margin:12px 0;}
  .close-modal{float:right;background:none;border:none;color:var(--gold);font-size:1.5rem;cursor:pointer;}
</style>
</head>
<body>
<div id="login-screen" class="container">
  <div class="card">
    <h2>🔒 後台管理</h2>
    <input type="password" id="pwd-input" placeholder="請輸入管理員密碼">
    <button class="btn" onclick="login()">進入後台</button>
    <div class="error" id="login-error">❌ 密碼錯誤</div>
  </div>
</div>

<div id="admin-screen" class="container" style="display:none;">
  <div class="card">
    <h2>✏️ 編輯前台內容</h2>

    <!-- 個人資料 -->
    <div class="section-title">個人資料</div>
    <label>Logo 圖片（貼上網址或上傳）</label>
    <input type="text" id="logo-url" placeholder="https://example.com/logo.png 或留空使用預設">
    <input type="file" id="logo-file" accept="image/*" style="margin-top:-10px;" onchange="uploadLogo()">
    <label>顯示名稱</label>
    <input type="text" id="username" placeholder="luckyDLGbet">
    <label>個人簡介（換行請用 \n）</label>
    <textarea id="bio" rows="3" placeholder="第一行\n第二行"></textarea>
    <label>頁尾文字</label>
    <input type="text" id="footer" placeholder="18+ · 請適度遊戲">

    <!-- 社群圖示 -->
    <div class="section-title">社群圖示（最多 6 個）</div>
    <div id="socials-container"></div>
    <button class="btn-outline btn" onclick="addSocial()" style="margin-bottom:16px;">+ 新增社群</button>

    <!-- 連結按鈕 -->
    <div class="section-title">連結按鈕（最多 8 個）</div>
    <div id="links-container"></div>
    <button class="btn-outline btn" onclick="addLink()" style="margin-bottom:16px;">+ 新增按鈕</button>

    <!-- 操作按鈕 -->
    <button class="btn" onclick="saveLocal()">💾 儲存到本機（僅自己預覽）</button>
    <button class="btn" onclick="exportData()" style="margin-top:6px;">📤 匯出更新資料（複製貼到 index.html）</button>
  </div>
</div>

<!-- 匯出彈窗 -->
<div id="export-modal" class="modal" style="display:none;">
  <div class="modal-box">
    <button class="close-modal" onclick="closeModal()">&times;</button>
    <h3 style="color:var(--gold);font-family:'Cinzel',serif;">📋 複製以下程式碼</h3>
    <p style="font-size:0.8rem;color:var(--text-dim);margin-bottom:8px;">打開 index.html，找到 <code>const DEFAULT_DATA = { ... };</code>，用下面的內容完全取代那一段（從 <code>{</code> 到 <code>};</code>）</p>
    <div class="modal-text" id="export-text"></div>
    <button class="btn" onclick="copyExport()">📋 複製到剪貼簿</button>
    <p style="color:var(--gold);font-size:0.7rem;margin-top:8px;">複製後重新上傳 index.html 到 GitHub，所有訪客就能看到更新！</p>
  </div>
</div>

<script>
// ========== 預設設定 ==========
const DEFAULT_PASSWORD = 'dlgbet2024'; // 可在這裡直接改後台密碼

const DEFAULT_DATA = {
  username: 'luckyDLGbet',
  bio: '🎯 每日投注策略及訊號📋\\n每晚8點直播 💎 加入我們的免費社群↓',
  footer: '18+ · 娛樂用途 · 請適度遊戲 · Gamble Responsibly',
  logoData: null,
  socials: [
    { type: 'instagram', url: 'https://instagram.com/' },
    { type: 'x', url: 'https://x.com/' },
    { type: 'tiktok', url: 'https://tiktok.com/' }
  ],
  links: [
    { label: 'Instagram', url: 'https://instagram.com/', icon: 'instagram', featured: false },
    { label: 'X (Twitter)', url: 'https://x.com/', icon: 'x', featured: false },
    { label: 'TikTok', url: 'https://tiktok.com/', icon: 'tiktok', featured: false },
    { label: '加入 Discord 社群', url: 'https://discord.gg/', icon: 'discord', featured: true },
    { label: '加入 Telegram 頻道', url: 'https://t.me/', icon: 'telegram', featured: true },
    { label: '立即註冊 DLG BET 🎰', url: '#', icon: 'bet', featured: true }
  ]
};

// 讀取本機儲存，若無則用預設
let data = JSON.parse(localStorage.getItem('dlgbet_admin_data')) || JSON.parse(JSON.stringify(DEFAULT_DATA));

// ========== 登入 ==========
function login(){
  if(document.getElementById('pwd-input').value === DEFAULT_PASSWORD){
    document.getElementById('login-screen').style.display='none';
    document.getElementById('admin-screen').style.display='block';
    renderAdmin();
  }else{
    document.getElementById('login-error').style.display='block';
    document.getElementById('pwd-input').value='';
  }
}
document.getElementById('pwd-input').addEventListener('keydown',e=>{if(e.key==='Enter')login();});

// ========== 渲染後台 ==========
function renderAdmin(){
  document.getElementById('username').value = data.username;
  document.getElementById('bio').value = data.bio.replace(/\\n/g,'\n');
  document.getElementById('footer').value = data.footer;
  document.getElementById('logo-url').value = data.logoData || '';

  renderSocials();
  renderLinks();
}

function renderSocials(){
  const container = document.getElementById('socials-container');
  container.innerHTML = '';
  data.socials.forEach((s,i)=>{
    const div = document.createElement('div');
    div.className = 'link-row';
    div.innerHTML = `
      <select onchange="data.socials[${i}].type=this.value">
        <option value="instagram" ${s.type==='instagram'?'selected':''}>Instagram</option>
        <option value="x" ${s.type==='x'?'selected':''}>X (Twitter)</option>
        <option value="tiktok" ${s.type==='tiktok'?'selected':''}>TikTok</option>
        <option value="discord" ${s.type==='discord'?'selected':''}>Discord</option>
        <option value="telegram" ${s.type==='telegram'?'selected':''}>Telegram</option>
        <option value="youtube" ${s.type==='youtube'?'selected':''}>YouTube</option>
        <option value="twitch" ${s.type==='twitch'?'selected':''}>Twitch</option>
      </select>
      <div style="display:flex;gap:4px;">
        <input type="text" value="${s.url}" placeholder="https://..." oninput="data.socials[${i}].url=this.value" style="flex:1;">
        <button class="btn-sm" onclick="deleteSocial(${i})">✕</button>
      </div>`;
    container.appendChild(div);
  });
}

function renderLinks(){
  const container = document.getElementById('links-container');
  container.innerHTML = '';
  data.links.forEach((link,i)=>{
    const div = document.createElement('div');
    div.style.background='rgba(255,255,255,0.03)';
    div.style.border='1px solid rgba(201,168,76,0.1)';
    div.style.borderRadius='8px';
    div.style.padding='10px';
    div.style.marginBottom='10px';
    div.innerHTML = `
      <div style="display:flex;gap:8px;margin-bottom:8px;">
        <input type="text" value="${link.label}" placeholder="按鈕名稱" oninput="data.links[${i}].label=this.value" style="flex:1;">
        <select onchange="data.links[${i}].icon=this.value">
          <option value="instagram" ${link.icon==='instagram'?'selected':''}>Instagram</option>
          <option value="x" ${link.icon==='x'?'selected':''}>X</option>
          <option value="tiktok" ${link.icon==='tiktok'?'selected':''}>TikTok</option>
          <option value="discord" ${link.icon==='discord'?'selected':''}>Discord</option>
          <option value="telegram" ${link.icon==='telegram'?'selected':''}>Telegram</option>
          <option value="youtube" ${link.icon==='youtube'?'selected':''}>YouTube</option>
          <option value="twitch" ${link.icon==='twitch'?'selected':''}>Twitch</option>
          <option value="bet" ${link.icon==='bet'?'selected':''}>Bet</option>
          <option value="link" ${link.icon==='link'?'selected':''}>預設</option>
        </select>
      </div>
      <div style="display:flex;gap:8px;align-items:center;">
        <input type="text" value="${link.url}" placeholder="https://..." oninput="data.links[${i}].url=this.value" style="flex:2;">
        <label class="toggle">
          <input type="checkbox" ${link.featured?'checked':''} onchange="data.links[${i}].featured=this.checked">
          <div class="toggle-track"></div>
        </label>
        <span style="font-size:0.7rem;color:var(--text-dim);">精選</span>
        <button class="btn-sm" onclick="deleteLink(${i})" style="margin-left:auto;">✕</button>
      </div>`;
    container.appendChild(div);
  });
}

// 增刪項目
function addSocial(){ if(data.socials.length<6){ data.socials.push({type:'instagram',url:'https://'}); renderSocials(); } }
function deleteSocial(i){ data.socials.splice(i,1); renderSocials(); }
function addLink(){ if(data.links.length<8){ data.links.push({label:'新按鈕',url:'https://',icon:'link',featured:false}); renderLinks(); } }
function deleteLink(i){ data.links.splice(i,1); renderLinks(); }

// 上傳 Logo 轉 Base64
function uploadLogo(){
  const file = document.getElementById('logo-file').files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    data.logoData = e.target.result;
    document.getElementById('logo-url').value = '[已上傳圖片]';
  };
  reader.readAsDataURL(file);
}

// 從 URL 載入
document.getElementById('logo-url').addEventListener('input', function(){
  const val = this.value.trim();
  if(val.startsWith('http')) data.logoData = val;
  else if(val === '') data.logoData = null;
});

// 從文字框更新其他欄位
document.getElementById('username').addEventListener('input',e=>data.username=e.target.value);
document.getElementById('bio').addEventListener('input',e=>data.bio=e.target.value.replace(/\n/g,'\\n'));
document.getElementById('footer').addEventListener('input',e=>data.footer=e.target.value);

// 儲存到本機（即時預覽）
function saveLocal(){
  // 確保 bio 已更新
  data.bio = document.getElementById('bio').value.replace(/\n/g,'\\n');
  data.username = document.getElementById('username').value;
  data.footer = document.getElementById('footer').value;
  localStorage.setItem('dlgbet_admin_data', JSON.stringify(data));
  alert('✅ 已儲存到本機！現在回到前台 https://zev-666.github.io/ 重新整理，您就會看到修改（只有您能看到）。');
}

// 匯出供 index.html 使用
function exportData(){
  // 同步最新資料
  data.bio = document.getElementById('bio').value.replace(/\n/g,'\\n');
  data.username = document.getElementById('username').value;
  data.footer = document.getElementById('footer').value;
  const exportObj = {
    username: data.username,
    bio: data.bio,
    footer: data.footer,
    logoData: data.logoData,
    socials: data.socials,
    links: data.links
  };
  const text = 'const DEFAULT_DATA = ' + JSON.stringify(exportObj, null, 2) + ';';
  document.getElementById('export-text').textContent = text;
  document.getElementById('export-modal').style.display = 'flex';
}

function closeModal(){
  document.getElementById('export-modal').style.display = 'none';
}

function copyExport(){
  const text = document.getElementById('export-text').textContent;
  navigator.clipboard.writeText(text).then(()=>alert('✅ 已複製！請貼到 index.html 的 DEFAULT_DATA 位置並重新上傳。'));
}

// ========== 初始化 ==========
</script>
</body>
</html>
