<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>DLG Global - 后台管理</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #C9A84C;
      --gold-light: #FFD700;
      --gold-pale: #f0d080;
      --gold-dark: #8B6914;
      --black: #060608;
      --black2: #0e0e12;
      --black3: #16161c;
      --glass: rgba(255,255,255,0.04);
      --glass-border: rgba(201,168,76,0.25);
      --text: #f0e6c8;
      --text-dim: #a08050;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--black);
      font-family: 'Raleway', sans-serif;
      color: var(--text);
      min-height: 100vh;
    }
    .bg-radial {
      position: fixed; inset: 0; z-index: 0;
      background: radial-gradient(ellipse 60% 50% at 50% 0%, rgba(201,168,76,0.1) 0%, transparent 70%);
      pointer-events: none;
    }
    .page { position: relative; z-index: 1; }
    .hidden { display: none !important; }
    /* 登入样式 */
    #page-login {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .login-card {
      width: 100%; max-width: 380px;
      background: var(--black2);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 48px 36px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.6), 0 0 60px rgba(201,168,76,0.05);
    }
    .login-logo {
      text-align: center;
      margin-bottom: 24px;
      font-size: 3rem;
    }
    .login-title {
      font-family: 'Cinzel', serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--gold);
      text-align: center;
      margin-bottom: 8px;
      letter-spacing: 0.1em;
    }
    .login-sub {
      font-size: 0.78rem;
      color: var(--text-dim);
      text-align: center;
      margin-bottom: 32px;
      letter-spacing: 0.05em;
    }
    .input-wrap { margin-bottom: 16px; }
    .input-wrap input {
      width: 100%;
      padding: 14px 18px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Raleway', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: all 0.3s;
      letter-spacing: 0.05em;
    }
    .input-wrap input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 2px rgba(201,168,76,0.1);
    }
    .btn-primary {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--gold-dark), var(--gold), var(--gold-dark));
      background-size: 200% 100%;
      border: none;
      border-radius: 10px;
      font-family: 'Cinzel', serif;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      color: #0a0a0a;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.3s;
      margin-top: 8px;
    }
    .btn-primary:hover {
      box-shadow: 0 8px 24px rgba(201,168,76,0.35);
      transform: translateY(-1px);
    }
    .login-error {
      color: #ff6b6b;
      font-size: 0.78rem;
      text-align: center;
      margin-top: 12px;
      display: none;
    }
    /* 后台样式 */
    #page-admin { min-height: 100vh; display: flex; flex-direction: column; }
    .admin-header {
      background: var(--black2);
      border-bottom: 1px solid var(--glass-border);
      padding: 16px 24px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 50;
      backdrop-filter: blur(16px);
    }
    .admin-header-left { display: flex; align-items: center; gap: 12px; }
    .admin-brand {
      font-family: 'Cinzel', serif;
      font-size: 1rem;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 0.1em;
    }
    .admin-badge {
      font-size: 0.62rem;
      background: rgba(201,168,76,0.15);
      border: 1px solid rgba(201,168,76,0.3);
      color: var(--gold);
      padding: 3px 8px;
      border-radius: 20px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .admin-actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .btn-sm {
      padding: 8px 16px;
      border-radius: 8px;
      font-family: 'Raleway', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: all 0.2s;
      border: none;
    }
    .btn-save {
      background: linear-gradient(135deg, var(--gold-dark), var(--gold));
      color: #0a0a0a;
      font-weight: 700;
    }
    .btn-save:hover {
      box-shadow: 0 4px 16px rgba(201,168,76,0.3);
      transform: translateY(-1px);
    }
    .btn-export {
      background: rgba(80,200,80,0.1);
      border: 1px solid rgba(80,200,80,0.3) !important;
      color: #80ff80;
    }
    .btn-export:hover { background: rgba(80,200,80,0.2); }
    .btn-logout {
      background: rgba(255,80,80,0.1);
      border: 1px solid rgba(255,80,80,0.25) !important;
      color: #ff8080;
    }
    .btn-logout:hover { background: rgba(255,80,80,0.2); }
    .admin-body {
      flex: 1;
      padding: 24px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      max-width: 1100px;
      margin: 0 auto;
      width: 100%;
    }
    @media (max-width: 768px) {
      .admin-body { grid-template-columns: 1fr; }
      .admin-header { flex-direction: column; gap: 12px; }
    }
    .admin-card {
      background: var(--black2);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 24px;
    }
    .card-title {
      font-family: 'Cinzel', serif;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(201,168,76,0.15);
      display: flex; align-items: center; gap: 8px;
    }
    .card-title svg { width: 16px; height: 16px; fill: var(--gold); opacity: 0.7; }
    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--text-dim);
      margin-bottom: 6px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .form-input, .form-textarea, .form-select {
      width: 100%;
      padding: 11px 14px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(201,168,76,0.18);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Raleway', sans-serif;
      font-size: 0.86rem;
      outline: none;
      transition: all 0.2s;
    }
    .form-input:focus, .form-textarea:focus, .form-select:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 2px rgba(201,168,76,0.08);
    }
    .form-textarea { resize: vertical; min-height: 100px; line-height: 1.6; }
    .form-select { background: rgba(20,18,14,0.8); cursor: pointer; }
    .form-select option { background: var(--black2); }
    .link-item {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(201,168,76,0.12);
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 10px;
      transition: border-color 0.2s;
    }
    .link-item:hover { border-color: rgba(201,168,76,0.25); }
    .link-item-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 10px;
    }
    .link-item-num {
      font-family: 'Cinzel', serif;
      font-size: 0.7rem;
      color: var(--gold-dark);
      font-weight: 700;
      letter-spacing: 0.1em;
    }
    .link-item-actions { display: flex; gap: 6px; }
    .icon-btn {
      width: 28px; height: 28px;
      border-radius: 6px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
      color: var(--text-dim);
    }
    .icon-btn:hover {
      background: rgba(201,168,76,0.12);
      border-color: rgba(201,168,76,0.3);
      color: var(--gold);
    }
    .icon-btn.del:hover {
      background: rgba(255,80,80,0.12);
      border-color: rgba(255,80,80,0.3);
      color: #ff8080;
    }
    .icon-btn svg { width: 13px; height: 13px; fill: currentColor; }
    .link-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    @media (max-width: 480px) { .link-row { grid-template-columns: 1fr; } }
    .add-link-btn {
      width: 100%;
      padding: 12px;
      background: rgba(201,168,76,0.06);
      border: 1px dashed rgba(201,168,76,0.25);
      border-radius: 10px;
      color: var(--text-dim);
      font-family: 'Raleway', sans-serif;
      font-size: 0.82rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      gap: 8px;
      transition: all 0.2s;
      font-weight: 500;
    }
    .add-link-btn:hover {
      background: rgba(201,168,76,0.12);
      border-color: var(--gold);
      color: var(--gold);
    }
    .add-link-btn svg { width: 14px; height: 14px; fill: currentColor; }
    .toggle { position: relative; width: 36px; height: 20px; cursor: pointer; }
    .toggle input { display: none; }
    .toggle-track {
      width: 36px; height: 20px;
      border-radius: 10px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.1);
      transition: all 0.3s;
      position: relative;
    }
    .toggle input:checked + .toggle-track {
      background: linear-gradient(90deg, var(--gold-dark), var(--gold));
      border-color: var(--gold);
    }
    .toggle-track::after {
      content: '';
      position: absolute;
      top: 2px; left: 2px;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: white;
      transition: left 0.3s;
    }
    .toggle input:checked + .toggle-track::after { left: 18px; }
    .toggle-label { font-size: 0.75rem; color: var(--text-dim); }
    .pwd-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    @media (max-width: 480px) { .pwd-row { grid-template-columns: 1fr; } }
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
    .stat-box {
      background: rgba(201,168,76,0.06);
      border: 1px solid rgba(201,168,76,0.15);
      border-radius: 10px;
      padding: 14px 12px;
      text-align: center;
    }
    .stat-num {
      font-family: 'Cinzel', serif;
      font-size: 1.5rem;
      color: var(--gold);
      font-weight: 700;
    }
    .stat-lbl {
      font-size: 0.65rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-top: 2px;
    }
    .logo-upload-area {
      border: 2px dashed rgba(201,168,76,0.25);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }
    .logo-upload-area:hover {
      border-color: var(--gold);
      background: rgba(201,168,76,0.04);
    }
    .logo-upload-area input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .logo-preview {
      width: 64px; height: 64px;
      border-radius: 50%;
      margin: 0 auto 8px;
      overflow: hidden;
      background: var(--black3);
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
    }
    .logo-preview img { width: 100%; height: 100%; object-fit: cover; }
    .logo-upload-hint { font-size: 0.75rem; color: var(--text-dim); }

    /* Toast 提示 */
    .toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      padding: 12px 24px;
      border-radius: 30px;
      font-family: 'Cinzel', serif;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      z-index: 9999;
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      white-space: nowrap;
    }
    .toast.success {
      background: linear-gradient(135deg, var(--gold-dark), var(--gold));
      color: #0a0a0a;
      box-shadow: 0 8px 30px rgba(201,168,76,0.4);
    }
    .toast.info {
      background: linear-gradient(135deg, #1a4a1a, #2a7a2a);
      color: #80ff80;
      box-shadow: 0 8px 30px rgba(80,200,80,0.3);
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* 导出弹窗 */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.8);
      z-index: 200;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .modal-box {
      background: var(--black2);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 28px;
      max-width: 600px;
      width: 100%;
      max-height: 80vh;
      overflow-y: auto;
    }
    .modal-title {
      font-family: 'Cinzel', serif;
      color: var(--gold);
      font-size: 1rem;
      margin-bottom: 12px;
      letter-spacing: 0.1em;
    }
    .modal-desc {
      font-size: 0.82rem;
      color: var(--text-dim);
      margin-bottom: 16px;
      line-height: 1.6;
    }
    .modal-code {
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 8px;
      padding: 14px;
      font-family: monospace;
      font-size: 0.75rem;
      color: #aaffaa;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 200px;
      overflow-y: auto;
      margin-bottom: 16px;
    }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
  </style>
</head>
<body>
  <div class="bg-radial"></div>
  <div class="toast" id="toast"></div>

  <!-- 导出弹窗 -->
  <div class="modal-overlay hidden" id="export-modal">
    <div class="modal-box">
      <div class="modal-title">📤 导出资料 - 永久更新 index.html</div>
      <div class="modal-desc">
        复制下方代码，打开你的 <strong style="color:var(--gold)">index.html</strong>，找到 <code style="color:#aaffaa">const DEFAULT_DATA = {</code> 这一行，<strong>将整个 DEFAULT_DATA 区块替换</strong>成下方内容，再重新上传到 GitHub，所有访客就能看到更新。
      </div>
      <div class="modal-code" id="export-code"></div>
      <div class="modal-actions">
        <button class="btn-sm btn-export" onclick="copyExport()">📋 复制代码</button>
        <button class="btn-sm btn-logout" onclick="closeExport()">关闭</button>
      </div>
    </div>
  </div>

  <!-- 登入页面 -->
  <div id="page-login" class="page">
    <div class="login-card">
      <div class="login-logo">👑</div>
      <div class="login-title">ADMIN PANEL</div>
      <div class="login-sub">DLG Global 后台管理系统</div>
      <div class="input-wrap">
        <input type="password" id="login-pwd" placeholder="请输入管理员密码" autocomplete="current-password">
      </div>
      <button class="btn-primary" onclick="doLogin()">进入后台 →</button>
      <div class="login-error" id="login-error">❌ 密码错误，请再试一次</div>
    </div>
  </div>

  <!-- 后台页面 -->
  <div id="page-admin" class="page hidden">
    <div class="admin-header">
      <div class="admin-header-left">
        <div class="admin-brand">DLG GLOBAL</div>
        <div class="admin-badge">后台管理</div>
      </div>
      <div class="admin-actions">
        <button class="btn-sm btn-save" onclick="saveAll()">💾 储存</button>
        <button class="btn-sm btn-export" onclick="openExport()">📤 导出资料</button>
        <button class="btn-sm btn-logout" onclick="doLogout()">登出</button>
      </div>
    </div>

    <div class="admin-body">
      <!-- 左栏 -->
      <div style="display:flex;flex-direction:column;gap:20px">
        <div class="admin-card">
          <div class="card-title"><svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>统计概览</div>
          <div class="stats-row">
            <div class="stat-box"><div class="stat-num" id="stat-links">0</div><div class="stat-lbl">连结</div></div>
            <div class="stat-box"><div class="stat-num" id="stat-socials">0</div><div class="stat-lbl">社群</div></div>
            <div class="stat-box"><div class="stat-num">✦</div><div class="stat-lbl">上线中</div></div>
          </div>
        </div>

        <div class="admin-card">
          <div class="card-title"><svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>个人资料</div>
          <div class="form-group">
            <label class="form-label">Logo 图片</label>
            <div class="logo-upload-area">
              <input type="file" accept="image/*" onchange="handleLogoUpload(event)">
              <div class="logo-preview" id="logo-preview">🦁</div>
              <div class="logo-upload-hint">点击上传图片（JPG/PNG）</div>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">显示名称</label>
            <input type="text" class="form-input" id="admin-username" placeholder="例：DLG Global">
          </div>
          <div class="form-group">
            <label class="form-label">个人简介（支援 Emoji，换行用 Enter）</label>
            <textarea class="form-textarea" id="admin-bio" placeholder="输入简介..."></textarea>
          </div>
          <div class="form-group">
            <label class="form-label">页尾文字</label>
            <input type="text" class="form-input" id="admin-footer" placeholder="18+ · 请适度游戏">
          </div>
        </div>

        <div class="admin-card">
          <div class="card-title"><svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM12 17c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zM9 8V6c0-1.66 1.34-3 3-3s3 1.34 3 3v2H9z"/></svg>修改密码</div>
          <div class="pwd-row">
            <div class="form-group"><label class="form-label">新密码</label><input type="password" class="form-input" id="new-pwd" placeholder="新密码"></div>
            <div class="form-group"><label class="form-label">确认密码</label><input type="password" class="form-input" id="confirm-pwd" placeholder="再输入一次"></div>
          </div>
          <button class="btn-sm btn-save" style="width:100%;padding:11px" onclick="changePassword()">更新密码</button>
        </div>
      </div>

      <!-- 右栏 -->
      <div style="display:flex;flex-direction:column;gap:20px">
        <div class="admin-card">
          <div class="card-title"><svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92-1.31-2.92-2.92-2.92z"/></svg>社群图示</div>
          <div id="admin-socials-wrap"></div>
          <button class="add-link-btn" onclick="addSocial()"><svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>新增社群图示</button>
        </div>

        <div class="admin-card">
          <div class="card-title"><svg viewBox="0 0 24 24"><path d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/></svg>连结按钮</div>
          <div id="admin-links-wrap"></div>

    function gi(t) { return ICONS[t] || ICONS.link; }
    function getPass() { return localStorage.getItem(PASS_KEY) || DEFAULT_PASS; }
    function loadData() {
      try {
        const s = localStorage.getItem(STORAGE_KEY);
        if (s) return { ...DEFAULT_DATA, ...JSON.parse(s) };
      } catch(e) {}
      return { ...DEFAULT_DATA };
    }
    function saveDataStore(d) {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch(e) {}
    }

    let DATA = loadData();

    // ==================== 登入/登出 ====================
    function doLogin() {
      const p = document.getElementById('login-pwd').value;
      if (p === getPass()) {
        document.getElementById('login-error').style.display = 'none';
        document.getElementById('login-pwd').value = '';
        document.getElementById('page-login').classList.add('hidden');
        document.getElementById('page-admin').classList.remove('hidden');
        renderAdmin();
      } else {
        document.getElementById('login-error').style.display = 'block';
        document.getElementById('login-pwd').value = '';
      }
    }
    function doLogout() {
      document.getElementById('page-admin').classList.add('hidden');
      document.getElementById('page-login').classList.remove('hidden');
    }
    document.getElementById('login-pwd').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') doLogin();
    });

    // ==================== 渲染后台 ====================

      document.getElementById('admin-username').value = DATA.username || '';

      document.getElementById('admin-footer').value = DATA.footer || '';
      document.getElementById('stat-links').textContent = (DATA.links || []).length;
      document.getElementById('stat-socials').textContent = (DATA.socials || []).length;
      if (DATA.logoData) {
        const lp = document.getElementById('logo-preview');
        lp.innerHTML = `<img src="${DATA.logoData}">`;
      }
      renderAdminSocials();
      renderAdminLinks();
    }

    function renderAdminSocials() {
      const w = document.getElementById('admin-socials-wrap');
      w.innerHTML = '';
      (DATA.socials || []).forEach(function(s, i) {
        const d = document.createElement('div');
        d.className = 'link-item';
        d.innerHTML = `<div class="link-item-header"><span class="link-item-num">社群 #${i+1}</span><div class="link-item-actions"><button class="icon-btn del" onclick="deleteSocial(${i})"><svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg></button></div></div><div class="link-row"><div class="form-group" style="margin:0"><label class="form-label">平台</label><select class="form-select" onchange="updateSocial(${i},'type',this.value)">${['instagram','x','tiktok','discord','telegram'].map(function(t){return `<option value="${t}"${s.type===t?' selected':''}>${t}</option>`}).join('')}</select></div><div class="form-group" style="margin:0"><label class="form-label">URL</label><input type="text" class="form-input" value="${s.url||''}" placeholder="https://..." oninput="updateSocial(${i},'url',this.value)"></div></div>`;

      });
    }

    function renderAdminLinks() {
      const w = document.getElementById('admin-links-wrap');
      w.innerHTML = '';
      (DATA.links || []).forEach(function(link, i) {
        const d = document.createElement('div');

        d.innerHTML = `<div class="link-item-header"><span class="link-item-num">按钮 #${i+1}</span><div class="link-item-actions"><button class="icon-btn" onclick="moveLink(${i},-1)"><svg viewBox="0 0 24 24"><path d="M7.41 15.41L12 10.83l4.59 4.58L18 14l-6-6-6 6z"/></svg></button><button class="icon-btn" onclick="moveLink(${i},1)"><svg viewBox="0 0 24 24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z"/></svg></button><button class="icon-btn del" onclick="deleteLink(${i})"><svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg></button></div></div><div class="link-row"><div class="form-group" style="margin:0"><label class="form-label">按钮名称</label><input type="text" class="form-input" value="${link.label||''}" oninput="updateLink(${i},'label',this.value)"></div><div class="form-group" style="margin:0"><label class="form-label">图示</label><select class="form-select" onchange="updateLink(${i},'icon',this.value)">${Object.keys(ICONS).map(function(t){return `<option value="${t}"${link.icon===t?' selected':''}>${t}</option>`}).join('')}</select></div></div><div class="form-group" style="margin:8px 0 0"><label class="form-label">连结 URL</label><input type="text" class="form-input" value="${link.url||''}" oninput="updateLink(${i},'url',this.value)"></div><div style="margin-top:10px;display:flex;align-items:center;gap:12px"><label class="toggle"><input type="checkbox"${link.featured?' checked':''} onchange="updateLink(${i},'featured',this.checked)"><div class="toggle-track"></div></label><span class="toggle-label">精选按钮（金色）</span></div>`;

    // ==================== 数据操作 ====================
    function updateLink(i, k, v) { DATA.links[i][k] = v; }
    function updateSocial(i, k, v) { DATA.socials[i][k] = v; }
    function addLink() {
      DATA.links.push({ label: '新按钮', url: 'https://', icon: 'link', featured: false });
      renderAdminLinks();
      document.getElementById('stat-links').textContent = DATA.links.length;
    }
    function deleteLink(i) {
      DATA.links.splice(i, 1);
      renderAdminLinks();
      document.getElementById('stat-links').textContent = DATA.links.length;
    }
    function moveLink(i, dir) {
      const j = i + dir;
      if (j < 0 || j >= DATA.links.length) return;
      [DATA.links[i], DATA.links[j]] = [DATA.links[j], DATA.links[i]];
      renderAdminLinks();
    }
    function addSocial() {
      DATA.socials.push({ type: 'instagram', url: 'https://' });
      renderAdminSocials();
      document.getElementById('stat-socials').textContent = DATA.socials.length;

      DATA.socials.splice(i, 1);
      renderAdminSocials();
      document.getElementById('stat-socials').textContent = DATA.socials.length;
    }

    function saveAll() {
      DATA.username = document.getElementById('admin-username').value;
      DATA.bio = document.getElementById('admin-bio').value;
      DATA.footer = document.getElementById('admin-footer').value;
      saveDataStore(DATA);
      showToast('✦ 储存成功！即时生效', 'success');
    }

    // ==================== 修改密码 ====================
    function changePassword() {
      const np = document.getElementById('new-pwd').value;
      const cp = document.getElementById('confirm-pwd').value;
      if (!np) return showToast('⚠️ 请输入新密码', 'success');
      if (np !== cp) return showToast('⚠️ 两次密码不一致', 'success');
      localStorage.setItem(PASS_KEY, np);
      document.getElementById('new-pwd').value = '';
      document.getElementById('confirm-pwd').value = '';
      showToast('✦ 密码已更新', 'success');
    }

    // ==================== Logo 上传 ====================
    function handleLogoUpload(e) {
      const file = e.target.files[0];
      if (!file) return;
      const r = new FileReader();
      r.onload = function(ev) {
        DATA.logoData = ev.target.result;
        const lp = document.getElementById('logo-preview');
        lp.innerHTML = `<img src="${ev.target.result}">`;
      };
      r.readAsDataURL(file);
    }

    // ==================== Toast 提示 ====================
    function showToast(msg, type) {
      type = type || 'success';
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast ' + type + ' show';
      setTimeout(function() { t.classList.remove('show'); }, 2800);
    }

    // ==================== 导出资料 ====================
    function openExport() {
      const exportData = { ...DATA };
      const json = JSON.stringify(exportData, null, 2);
      const code = `const DEFAULT_DATA = ${json};`;
      document.getElementById('export-code').textContent = code;
      document.getElementById('export-modal').classList.remove('hidden');
    }
    function closeExport() {
      document.getElementById('export-modal').classList.add('hidden');
    }
    function copyExport() {
      const code = document.getElementById('export-code').textContent;
      navigator.clipboard.writeText(code).then(function() {
        showToast('✦ 已复制！贴到 index.html 后重新上传', 'info');
      });
    }
