<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>DLG Global</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #C9A84C;
      --gold-light: #FFD700;
      --gold-pale: #f0d080;
      --gold-dark: #8B6914;
      --black: #060608;
      --black2: #0e0e12;
      --glass: rgba(255,255,255,0.04);
      --glass-border: rgba(201,168,76,0.25);
      --text: #f0e6c8;
      --text-dim: #a08050;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    #particles-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    body {
      background: var(--black);
      font-family: 'Raleway', sans-serif;
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }
    .bg-radial {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 60% 50% at 50% 0%, rgba(201,168,76,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 80% 60% at 80% 100%, rgba(139,105,20,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 20% 50%, rgba(201,168,76,0.05) 0%, transparent 60%);
      pointer-events: none;
    }
    .grain {
      position: fixed; inset: 0; z-index: 0; opacity: 0.03; pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    }
    #page-front {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-start;
      padding: 48px 20px 80px;
    }
    .profile-wrap {
      display: flex; flex-direction: column; align-items: center;
      margin-bottom: 20px;
      animation: fadeDown 0.8s ease both;
    }
    .logo-ring {
      position: relative; width: 110px; height: 110px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-ring::before {
      content: '';
      position: absolute; inset: -3px;
      border-radius: 50%;
      background: conic-gradient(from 0deg, var(--gold-dark), var(--gold-light), var(--gold), var(--gold-dark), var(--gold-light), var(--gold-dark));
      animation: spinRing 6s linear infinite;
      z-index: 0;
    }
    .logo-ring::after {
      content: '';
      position: absolute; inset: 2px;
      border-radius: 50%;
      background: var(--black);
      z-index: 1;
    }
    .logo-img {
      position: relative; z-index: 2;
      width: 94px; height: 94px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
      background: radial-gradient(135deg, #1a1508, #0a0a0a);
    }
    .logo-img svg { width: 60px; height: 60px; }
    .logo-img img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .logo-pulse {
      position: absolute; inset: -8px; border-radius: 50%; z-index: -1;
      background: radial-gradient(circle, rgba(201,168,76,0.3) 0%, transparent 70%);
      animation: pulse 2.5s ease-in-out infinite;
    }
    .username {
      font-family: 'Cinzel', serif;
      font-size: clamp(1.3rem, 5vw, 1.7rem);
      font-weight: 700;
      letter-spacing: 0.08em;
      margin-top: 16px;
      background: linear-gradient(135deg, var(--gold-pale) 0%, var(--gold-light) 40%, var(--gold) 70%, var(--gold-pale) 100%);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: fadeDown 0.9s 0.1s ease both;
      position: relative;
    }
    .username::after {
      content: attr(data-text);
      position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.4) 50%, transparent 100%);
      background-size: 200% 100%;
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 3s 2s linear infinite;
    }
    .bio {
      font-family: 'Raleway', sans-serif;
      font-size: 0.88rem; font-weight: 400;
      color: var(--text-dim);
      text-align: center; line-height: 1.8;
      max-width: 300px;
      margin-top: 10px; margin-bottom: 20px;
      animation: fadeDown 1s 0.2s ease both;
      letter-spacing: 0.02em;
    }
    .socials {
      display: flex; gap: 20px; align-items: center;
      margin-bottom: 32px;
      animation: fadeDown 1s 0.3s ease both;
    }
    .socials:empty { display: none; margin: 0; }
    .social-icon {
      width: 42px; height: 42px;
      border-radius: 50%;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; text-decoration: none;
      color: var(--gold);
      transition: all 0.3s ease;
      position: relative; overflow: hidden;
    }
    .social-icon::before {
      content: '';
      position: absolute; inset: 0; border-radius: 50%;
      background: radial-gradient(circle at center, rgba(201,168,76,0.2), transparent);
      opacity: 0; transition: opacity 0.3s;
    }
    .social-icon:hover {
      border-color: var(--gold);
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 8px 25px rgba(201,168,76,0.25);
    }
    .social-icon:hover::before { opacity: 1; }
    .social-icon svg { width: 18px; height: 18px; fill: currentColor; }
    .divider {
      width: 100%; max-width: 360px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-dark), var(--gold), var(--gold-dark), transparent);
      margin-bottom: 28px; opacity: 0.5;
      animation: fadeDown 1s 0.35s ease both;
    }
    .links-wrap {
      width: 100%; max-width: 360px;
      display: flex; flex-direction: column; gap: 12px;
    }
    .link-btn {
      position: relative; width: 100%; overflow: hidden;
      padding: 15px 24px;
      border-radius: 12px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      cursor: pointer; text-decoration: none;
      display: flex; align-items: center; justify-content: center; gap: 12px;
      font-family: 'Cinzel', serif;
      font-size: 0.82rem; font-weight: 600;
      letter-spacing: 0.12em; color: var(--text);
      text-transform: uppercase;
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      animation: fadeUp 0.6s ease both;
    }
    .link-btn::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(201,168,76,0.08) 0%, transparent 50%, rgba(201,168,76,0.05) 100%);
      opacity: 0; transition: opacity 0.35s;
    }
    .link-btn::after {
      content: '';
      position: absolute; left: -100%; top: 0;
      width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(201,168,76,0.12), transparent);
      transition: left 0.5s ease;
    }
    .link-btn:hover {
      border-color: var(--gold);
      color: var(--gold-light);
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(201,168,76,0.2), 0 0 0 1px rgba(201,168,76,0.15) inset;
    }
    .link-btn:hover::before { opacity: 1; }
    .link-btn:hover::after { left: 140%; }
    .link-btn .btn-icon { width: 20px; height: 20px; flex-shrink: 0; }
    .link-btn .btn-icon svg { width: 20px; height: 20px; fill: currentColor; }
    .link-btn.featured {
      background: linear-gradient(135deg, rgba(201,168,76,0.15), rgba(139,105,20,0.1));
      border-color: rgba(201,168,76,0.5);
      color: var(--gold-light);
    }
    .link-btn:nth-child(1) { animation-delay: 0.4s; }
    .link-btn:nth-child(2) { animation-delay: 0.5s; }
    .link-btn:nth-child(3) { animation-delay: 0.6s; }
    .link-btn:nth-child(4) { animation-delay: 0.7s; }
    .link-btn:nth-child(5) { animation-delay: 0.8s; }
    .link-btn:nth-child(6) { animation-delay: 0.9s; }
    .footer-note {
      margin-top: 40px;
      font-size: 0.68rem; color: rgba(160,128,80,0.4);
      font-family: 'Raleway', sans-serif; letter-spacing: 0.1em;
      text-transform: uppercase; text-align: center;
      animation: fadeDown 1s 1s ease both;
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes spinRing { to { transform: rotate(360deg); } }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.6; }
      50% { transform: scale(1.15); opacity: 0.2; }
    }
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
  </style>
</head>

  <script>
    (function() {
      const canvas = document.getElementById('particles-canvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      let W, H, particles = [];
      function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
      }
      function randomParticle() {
        return {
          x: Math.random() * W,
          y: Math.random() * H,
          size: Math.random() * 1.5 + 0.3,
          vx: (Math.random() - 0.5) * 0.3,
          vy: -Math.random() * 0.4 - 0.1,
          opacity: Math.random() * 0.6 + 0.1,
          life: Math.random()
        };
      }
      function init() {
        resize();
        particles = [];
        for (let i = 0; i < 80; i++) particles.push(randomParticle());
      }
      function draw() {
        ctx.clearRect(0, 0, W, H);
        particles.forEach((p, i) => {
          p.x += p.vx;
          p.y += p.vy;
          p.life += 0.003;
          if (p.y < -10 || p.life > 1) particles[i] = { ...randomParticle(), y: H + 5 };
          const alpha = Math.sin(p.life * Math.PI) * p.opacity;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(201,168,76,${alpha})`;
          ctx.fill();
        });
        requestAnimationFrame(draw);
      }
      window.addEventListener('resize', resize);
      init();
      draw();
    })();
  </script>
